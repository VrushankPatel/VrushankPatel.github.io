<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vrushank Patel - Senior Software Developer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html {
            scroll-behavior: smooth;
        }

        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-color: #d1d5db;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --heading-color: #000000;
            --subtitle-color: #000000;
            --date-color: #000000;
            --link-color: #2b6cb0;
            --section-border: #d1d5db;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            max-width: 950px;
            margin: 15px auto;
            padding: 20px;
            color: var(--text-color);
            line-height: 1.4;
            border: 1px solid var(--border-color);
            box-shadow: 0 1px 3px var(--shadow-color);
            text-align: justify;
            background-color: var(--bg-color);
            transition: all 0.3s ease;
        }

        .download-button {
            position: fixed;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 2px 5px var(--shadow-color);
            transition: all 0.3s ease;
            top: 15px;
            right: 15px;
        }

        .download-button:hover {
            transform: scale(1.1);
        }

        .download-button i {
            font-size: 18px;
            color: var(--text-color);
        }

        /* Print-specific styles */
        @media print {

            .download-button {
                display: none !important;
            }

            body {
                margin: 30 !important;
                padding: 15px 15px !important;
                max-width: 95% !important;
                border: none !important;
                box-shadow: none !important;
                font-size: 12px !important;
                line-height: 1.4 !important;
                color: #000 !important;
                /* Force black text */
                background-color: #fff !important;
                /* Force white background */
            }

            /* Force all text elements to use black color regardless of theme */
            h1,
            h2,
            h3,
            p,
            li,
            div,
            span,
            .subtitle,
            .company-name,
            .date-location,
            .position,
            .skill-title,
            .skill-category,
            .section-title {
                color: #000 !important;
            }

            .date-location {
                font-weight: 700 !important;
            }

            /* Force all backgrounds to be white */
            div,
            section,
            header,
            footer {
                background-color: #fff !important;
            }

            /* Ensure borders are visible */
            .section-title {
                border-bottom: 1px solid #000 !important;
            }

            @page {
                margin: 0cm;
                size: 185mm 287mm;
            }

            h1 {
                font-size: 25px !important;

            }

            .subtitle {
                margin-bottom: 2px !important;
                font-size: 17px !important;
            }

            .contact-info {
                font-size: 15px !important;
                margin-bottom: 5px !important;
            }

            .section-title {
                font-size: 14px !important;
                margin-bottom: 4px !important;
                padding-bottom: 2px !important;
            }

            .experience-item,
            .skill-category {
                margin-bottom: 0px !important;
            }

            .company-header {
                margin-bottom: 0px !important;
            }

            .company-name {
                font-size: 14px !important;
            }

            .date-location {
                font-size: 13px !important;
            }

            .position {
                margin-bottom: 0px !important;
                font-size: 14px !important;
            }

            ul {
                margin-bottom: 3px !important;
                padding-left: 15px !important;
            }

            li {
                margin-bottom: 1px !important;
                font-size: 13.5px !important;
                line-height: 1.2 !important;
            }

            .header {
                margin-bottom: 4px !important;
            }

            .section {
                margin-bottom: 4px !important;
            }

            .skills-grid {
                display: block !important;
            }

            .skill-category {
                font-size: 13px !important;
                margin-bottom: 3px !important;
                display: flex !important;
            }

            .skill-title {
                margin-right: 5px !important;
                min-width: 180px !important;
                font-size: 13px !important;
            }

            .projects a {
                font-size: 12px !important;
                margin-right: 7px !important;
            }
        }

        .header {
            margin-bottom: 15px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 3px;
            color: var(--heading-color);
        }

        .subtitle {
            font-style: italic;
            color: var(--subtitle-color);
            margin-bottom: 5px;
        }

        .contact-info {
            font-size: 14px;
            margin-bottom: 8px;
        }

        .contact-info a {
            color: var(--link-color);
            text-decoration: none;
        }

        .contact-info a:hover {
            text-decoration: underline;
        }

        .section {
            margin-bottom: 12px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            border-bottom: 1px solid var(--section-border);
            padding-bottom: 3px;
            margin-bottom: 8px;
        }

        .experience-item {
            margin-bottom: 10px;
        }

        .company-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .company-name {
            font-weight: 600;
            color: var(--text-color);
            font-size: 14px;
        }

        .date-location {
            color: var(--date-color);
            font-size: 12px;
            font-weight: 700;
        }

        .position {
            font-weight: 500;
            margin-bottom: 4px;
        }

        ul {
            padding-left: 16px;
            margin-bottom: 5px;
        }

        li {
            margin-bottom: 2px;
            font-size: 13.5px;
            text-align: justify;
        }

        .skills-grid {
            display: block;
        }

        .skill-category {
            margin-bottom: 8px;
            font-size: 13px;
            display: flex;
        }

        .skill-title {
            font-weight: 500;
            margin-right: 5px;
            min-width: 180px;
        }

        .projects a {
            color: var(--link-color);
            text-decoration: none;
            margin-right: 10px;
        }

        .projects a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <script src="data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const d = portfolioData;
            
            // Experience HTML
            let expHtml = '';
            d.experience.forEach(exp => {
                let resHtml = exp.responsibilities.map(r => {
                    if (Array.isArray(r)) {
                        return `<ul style="margin-top: 2px; margin-bottom: 2px;">${r.map(subR => `<li>${subR}</li>`).join('')}</ul>`;
                    }
                    return `<li>${r}</li>`;
                }).join('');
                expHtml += `
                    <div class="experience-item">
                        <div class="company-header">
                            <div class="company-name">${exp.company}</div>
                            <div class="date-location">${exp.date} | ${exp.location}</div>
                        </div>
                        <div class="position">${exp.title}</div>
                        <ul>${resHtml}</ul>
                    </div>
                `;
            });

            // Skills HTML
            let skillsHtml = '';
            d.skills.forEach(skill => {
                skillsHtml += `
                    <div class="skill-category">
                        <div class="skill-title">${skill.category}:</div>
                        ${skill.items.join(', ')}
                    </div>
                `;
            });

            // Education HTML
            let eduHtml = '';
            d.education.forEach(edu => {
                eduHtml += `
                    <div class="experience-item">
                        <div class="company-header">
                            <div class="company-name">${edu.institution}</div>
                            <div class="date-location">${edu.date} | ${edu.location}</div>
                        </div>
                        <div>${edu.degree} (${edu.gpa})</div>
                    </div>
                `;
            });

            // Projects HTML
            let projHtml = '';
            d.projects.forEach(proj => {
                if (proj.link && proj.link !== "#") {
                    projHtml += `<a target="_blank" href="${proj.link}">${proj.name}</a>\n            `;
                }
            });

            const content = `
                <a href="Vrushank_Resume.pdf" class="download-button" id="download-button" download>
                    <i class="fas fa-download"></i>
                </a>
                <div class="header">
                    <h1>${d.profile.name}</h1>
                    <div class="contact-info">
                        ${d.contact.phone} | <a target="_blank" href="mailto:${d.contact.email}">${d.contact.email}</a> |
                        <a target="_blank" href="${d.contact.github}">Github</a> |
                        <a target="_blank" href="${d.contact.linkedin}">LinkedIn</a> |
                        <a target="_blank" href="${d.contact.codersrank}">CodersRank</a> 
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">Experience (${d.profile.metrics.experience})</div>
                    ${expHtml}
                </div>

                <div class="section">
                    <div class="section-title">Skills</div>
                    <div class="skills-grid">
                        ${skillsHtml}
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">Education</div>
                    ${eduHtml}
                </div>

                <div class="section">
                    <div class="section-title">Projects</div>
                    <div class="projects">
                        ${projHtml}
                    </div>
                </div>
            `;
            
            document.body.innerHTML = content;
        });
    </script>
</body>

</html>
